name: ZeroFounder Agent

on:
  schedule:
    - cron: "17 */2 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: Run mode
        type: choice
        options: [agent, setup-labels]
        default: agent
  issues:
    types: [opened, labeled]
  issue_comment:
    types: [created]

permissions:
  contents: read

concurrency:
  group: zerofounder-agent
  cancel-in-progress: false

jobs:
  preflight:
    if: github.event_name != 'workflow_dispatch' || inputs.mode == 'agent'
    permissions:
      actions: read
      contents: read
      issues: read
      pull-requests: read
    runs-on: ubuntu-latest
    outputs:
      should_call_model: ${{ steps.decision.outputs.should_call_model }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install -r requirements.txt
      - id: decision
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_EVENT_PATH: ${{ github.event_path }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          DAILY_MODEL_CALL_LIMIT: ${{ vars.DAILY_MODEL_CALL_LIMIT || '8' }}
          MODEL_DIAGNOSTIC_MODE: ${{ vars.MODEL_DIAGNOSTIC_MODE || 'false' }}
          MANUAL_DIAGNOSTIC_CALL_ALLOWANCE: ${{ vars.MANUAL_DIAGNOSTIC_CALL_ALLOWANCE || '1' }}
        run: |
          python -m agents.orchestrator preflight --output runtime/preflight.json
          python -c "import json,os; d=json.load(open('runtime/preflight.json')); open(os.environ['GITHUB_OUTPUT'],'a').write('should_call_model='+str(d['should_call_model']).lower()+'\n')"
      - name: Summarize model usage preflight
        if: always()
        run: python -m scripts.write_preflight_summary --preflight runtime/preflight.json
      - uses: actions/upload-artifact@v4
        with:
          name: preflight
          path: runtime/preflight.json
          retention-days: 1

  model:
    needs: preflight
    if: needs.preflight.outputs.should_call_model == 'true'
    permissions:
      contents: read
      models: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install -r requirements.txt
      - uses: actions/download-artifact@v4
        with:
          name: preflight
          path: runtime
      - id: model_run
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_MODEL: ${{ vars.GITHUB_MODEL }}
          GITHUB_FALLBACK_MODELS: ${{ vars.GITHUB_FALLBACK_MODELS }}
          GITHUB_EMBEDDING_MODEL: ${{ vars.GITHUB_EMBEDDING_MODEL }}
          MODEL_DIAGNOSTIC_MODE: ${{ vars.MODEL_DIAGNOSTIC_MODE || 'false' }}
          DAILY_MODEL_CALL_LIMIT: ${{ vars.DAILY_MODEL_CALL_LIMIT || '8' }}
          MAX_FILES_PER_ACTION: ${{ vars.MAX_FILES_PER_ACTION || '12' }}
          MAX_TOTAL_OUTPUT_CHARS: ${{ vars.MAX_TOTAL_OUTPUT_CHARS || '60000' }}
        run: |
          python -m agents.orchestrator model \
            --preflight runtime/preflight.json \
            --output runtime/action.json \
            --diagnostics runtime/model-diagnostic.json
      - name: Confirm inference call 1
        if: ${{ always() && fromJSON(steps.model_run.outputs.completed_inference_calls || '0') >= 1 }}
        run: "true"
      - name: Confirm inference call 2
        if: ${{ always() && fromJSON(steps.model_run.outputs.completed_inference_calls || '0') >= 2 }}
        run: "true"
      - name: Mark failed inference call 1
        if: ${{ always() && fromJSON(steps.model_run.outputs.failed_after_request_calls || '0') >= 1 }}
        run: "true"
      - name: Mark failed inference call 2
        if: ${{ always() && fromJSON(steps.model_run.outputs.failed_after_request_calls || '0') >= 2 }}
        run: "true"
      - name: Mark inference run skipped
        if: ${{ always() && fromJSON(steps.model_run.outputs.completed_inference_calls || '0') == 0 }}
        run: "true"
      - name: Summarize model action validation
        if: always()
        run: python -m scripts.write_model_summary --diagnostic runtime/model-diagnostic.json
      - uses: actions/upload-artifact@v4
        with:
          name: validated-action
          path: runtime/action.json
          retention-days: 1

  dependency-request:
    needs: model
    if: needs.model.result == 'success'
    permissions:
      contents: read
      issues: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install -r requirements.txt
      - uses: actions/download-artifact@v4
        with:
          name: validated-action
          path: runtime
      - env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python -m scripts.create_dependency_issue --action runtime/action.json

  issue-command:
    if: github.event_name == 'issue_comment'
    permissions:
      contents: read
      issues: write
    runs-on: ubuntu-latest
    outputs:
      valid: ${{ steps.command.outputs.valid }}
      kind: ${{ steps.command.outputs.kind }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install -r requirements.txt
      - id: command
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_EVENT_PATH: ${{ github.event_path }}
        run: python -m scripts.process_issue_command
      - uses: actions/upload-artifact@v4
        with:
          name: approval-command
          path: runtime/approval-command.json
          retention-days: 1

  apply-issue-command:
    needs: issue-command
    if: needs.issue-command.outputs.valid == 'true' && needs.issue-command.outputs.kind == 'lifecycle'
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install -r requirements.txt
      - uses: actions/download-artifact@v4
        with:
          name: approval-command
          path: runtime
      - env:
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: python -m scripts.apply_approval_command --input runtime/approval-command.json

  dependency-branch:
    needs: issue-command
    if: needs.issue-command.outputs.valid == 'true' && needs.issue-command.outputs.kind == 'dependency'
    permissions:
      contents: write
    runs-on: ubuntu-latest
    outputs:
      branch: ${{ steps.apply.outputs.branch }}
      sha: ${{ steps.apply.outputs.sha }}
      proposal_id: ${{ steps.apply.outputs.proposal_id }}
      package: ${{ steps.apply.outputs.package }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json
      - run: python -m pip install -r requirements.txt
      - run: npm ci
        if: hashFiles('package-lock.json') != ''
      - uses: actions/download-artifact@v4
        with:
          name: approval-command
          path: runtime
      - id: apply
        env:
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: python -m scripts.apply_dependency_branch --input runtime/approval-command.json --run-id "$GITHUB_RUN_ID"

  create-dependency-pr:
    needs: dependency-branch
    if: needs.dependency-branch.result == 'success'
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-latest
    outputs:
      pr_number: ${{ steps.pr.outputs.pr_number }}
      default_branch: ${{ steps.pr.outputs.default_branch }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install -r requirements.txt
      - id: pr
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python -m scripts.create_dependency_pr --branch '${{ needs.dependency-branch.outputs.branch }}' --sha '${{ needs.dependency-branch.outputs.sha }}' --proposal '${{ needs.dependency-branch.outputs.proposal_id }}' --package '${{ needs.dependency-branch.outputs.package }}'

  setup-labels:
    if: github.event_name == 'workflow_dispatch' && inputs.mode == 'setup-labels'
    permissions:
      contents: read
      issues: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install -r requirements.txt
      - env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python -m scripts.setup_labels

  create-branch:
    needs: [preflight, model]
    if: needs.model.result == 'success'
    permissions:
      contents: write
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.commit.outputs.changed }}
      branch: ${{ steps.commit.outputs.branch }}
      sha: ${{ steps.commit.outputs.sha }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json
      - run: python -m pip install -r requirements.txt
      - run: npm ci
        if: hashFiles('package-lock.json') != ''
      - uses: actions/download-artifact@v4
        with:
          name: preflight
          path: runtime
      - uses: actions/download-artifact@v4
        with:
          name: validated-action
          path: runtime
      - id: apply
        run: python -m scripts.apply_agent_action --action runtime/action.json --preflight runtime/preflight.json
      - if: steps.apply.outputs.changed == 'true'
        run: python -m pytest
      - if: steps.apply.outputs.changed == 'true'
        run: ruff check agents tests scripts
      - if: steps.apply.outputs.changed == 'true'
        run: python -m scripts.check_workflows
      - if: steps.apply.outputs.changed == 'true' && hashFiles('package-lock.json') != ''
        run: npm run lint && npm run typecheck && npm test -- --run && npm run build
      - if: steps.apply.outputs.changed == 'true'
        run: python -m pip_audit --cache-dir .cache/pip-audit -r requirements.txt
      - if: steps.apply.outputs.changed == 'true' && hashFiles('package-lock.json') != ''
        run: npm audit --audit-level=high
      - if: steps.apply.outputs.changed == 'true'
        run: python -m scripts.security_check
      - id: commit
        if: steps.apply.outputs.changed == 'true'
        env:
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: python -m scripts.commit_agent_changes --action runtime/action.json --run-id "$GITHUB_RUN_ID"

  create-pr:
    needs: create-branch
    if: needs.create-branch.outputs.changed == 'true'
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-latest
    outputs:
      pr_number: ${{ steps.pr.outputs.pr_number }}
      default_branch: ${{ steps.pr.outputs.default_branch }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install -r requirements.txt
      - uses: actions/download-artifact@v4
        with:
          name: validated-action
          path: runtime
      - id: pr
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python -m scripts.create_agent_pr --action runtime/action.json --branch '${{ needs.create-branch.outputs.branch }}' --sha '${{ needs.create-branch.outputs.sha }}'

  dispatch-quality-check:
    needs: [create-branch, create-pr, dependency-branch, create-dependency-pr]
    if: always() && (needs.create-pr.result == 'success' || needs.create-dependency-pr.result == 'success')
    permissions:
      actions: write
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install -r requirements.txt
      - env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ needs.create-pr.outputs.pr_number || needs.create-dependency-pr.outputs.pr_number }}
          AGENT_BRANCH: ${{ needs.create-branch.outputs.branch || needs.dependency-branch.outputs.branch }}
          COMMIT_SHA: ${{ needs.create-branch.outputs.sha || needs.dependency-branch.outputs.sha }}
          DEFAULT_BRANCH: ${{ needs.create-pr.outputs.default_branch || needs.create-dependency-pr.outputs.default_branch }}
        continue-on-error: true
        run: python -m scripts.dispatch_quality --pr "$PR_NUMBER" --branch "$AGENT_BRANCH" --sha "$COMMIT_SHA" --ref "$DEFAULT_BRANCH" --result runtime/dispatch.json
      - uses: actions/upload-artifact@v4
        with:
          name: quality-dispatch-result
          path: runtime/dispatch.json
          retention-days: 1

  record-dispatch-status:
    needs: [create-pr, create-dependency-pr, dispatch-quality-check]
    if: always() && (needs.create-pr.result == 'success' || needs.create-dependency-pr.result == 'success')
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install -r requirements.txt
      - uses: actions/download-artifact@v4
        with:
          name: quality-dispatch-result
          path: runtime
      - env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ needs.create-pr.outputs.pr_number || needs.create-dependency-pr.outputs.pr_number }}
        run: python -m scripts.update_pr_from_result --pr "$PR_NUMBER" --result runtime/dispatch.json
