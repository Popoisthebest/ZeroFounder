name: ZeroFounder 에이전트

on:
  schedule:
    - cron: "17 */2 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: 실행 모드
        type: choice
        options: [agent, setup-labels, migrate-language-dry-run, migrate-language-apply]
        default: agent
  issues:
    types: [opened, labeled]
  issue_comment:
    types: [created]

permissions:
  contents: read

concurrency:
  group: zerofounder-agent
  cancel-in-progress: false

jobs:
  preflight:
    name: 모델 호출 사전 점검
    if: github.event_name != 'workflow_dispatch' || inputs.mode == 'agent'
    permissions:
      actions: read
      contents: read
      issues: read
      pull-requests: read
    runs-on: ubuntu-latest
    outputs:
      should_call_model: ${{ steps.decision.outputs.should_call_model }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install -r requirements.txt
      - id: decision
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_EVENT_PATH: ${{ github.event_path }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          DAILY_MODEL_CALL_LIMIT: ${{ vars.DAILY_MODEL_CALL_LIMIT || '8' }}
          MODEL_DIAGNOSTIC_MODE: ${{ vars.MODEL_DIAGNOSTIC_MODE || 'false' }}
          MANUAL_DIAGNOSTIC_CALL_ALLOWANCE: ${{ vars.MANUAL_DIAGNOSTIC_CALL_ALLOWANCE || '1' }}
        run: |
          python -m agents.orchestrator preflight --output runtime/preflight.json
          python -c "import json,os; d=json.load(open('runtime/preflight.json')); open(os.environ['GITHUB_OUTPUT'],'a').write('should_call_model='+str(d['should_call_model']).lower()+'\n')"
      - name: 모델 사용량 사전 점검 요약
        if: always()
        run: python -m scripts.write_preflight_summary --preflight runtime/preflight.json
      - uses: actions/upload-artifact@v4
        with:
          name: preflight
          path: runtime/preflight.json
          retention-days: 1

  model:
    name: AI 의사결정 실행
    needs: preflight
    if: needs.preflight.outputs.should_call_model == 'true'
    permissions:
      contents: read
      models: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install -r requirements.txt
      - uses: actions/download-artifact@v4
        with:
          name: preflight
          path: runtime
      - id: model_run
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_MODEL: ${{ vars.GITHUB_MODEL }}
          GITHUB_FALLBACK_MODELS: ${{ vars.GITHUB_FALLBACK_MODELS }}
          GITHUB_EMBEDDING_MODEL: ${{ vars.GITHUB_EMBEDDING_MODEL }}
          MODEL_DIAGNOSTIC_MODE: ${{ vars.MODEL_DIAGNOSTIC_MODE || 'false' }}
          OPERATING_LANGUAGE: ${{ vars.OPERATING_LANGUAGE || 'ko' }}
          DAILY_MODEL_CALL_LIMIT: ${{ vars.DAILY_MODEL_CALL_LIMIT || '8' }}
          MAX_FILES_PER_ACTION: ${{ vars.MAX_FILES_PER_ACTION || '12' }}
          MAX_TOTAL_OUTPUT_CHARS: ${{ vars.MAX_TOTAL_OUTPUT_CHARS || '60000' }}
          MAX_MODEL_INPUT_TOKENS: ${{ vars.MAX_MODEL_INPUT_TOKENS || '6000' }}
          MAX_INPUT_CHARS: ${{ vars.MAX_INPUT_CHARS || '24000' }}
        run: |
          python -m agents.orchestrator model \
            --preflight runtime/preflight.json \
            --output runtime/model-action.json \
            --diagnostics runtime/model-diagnostic.json
      - name: 모델 호출 1 확인 [inference-confirm-1]
        if: ${{ always() && fromJSON(steps.model_run.outputs.completed_inference_calls || '0') >= 1 }}
        run: "true"
      - name: 모델 호출 2 확인 [inference-confirm-2]
        if: ${{ always() && fromJSON(steps.model_run.outputs.completed_inference_calls || '0') >= 2 }}
        run: "true"
      - name: HTTP 실패 호출 1 기록 [inference-http-failed-1]
        if: ${{ always() && fromJSON(steps.model_run.outputs.http_failed_calls || '0') >= 1 }}
        run: "true"
      - name: HTTP 실패 호출 2 기록 [inference-http-failed-2]
        if: ${{ always() && fromJSON(steps.model_run.outputs.http_failed_calls || '0') >= 2 }}
        run: "true"
      - name: 응답 검증 실패 호출 1 기록 [inference-validation-failed-1]
        if: ${{ always() && fromJSON(steps.model_run.outputs.response_validation_failed_calls || '0') >= 1 }}
        run: "true"
      - name: 응답 검증 실패 호출 2 기록 [inference-validation-failed-2]
        if: ${{ always() && fromJSON(steps.model_run.outputs.response_validation_failed_calls || '0') >= 2 }}
        run: "true"
      - name: 모델 호출 없는 실행 기록 [inference-skipped]
        if: ${{ always() && fromJSON(steps.model_run.outputs.completed_inference_calls || '0') == 0 }}
        run: "true"
      - name: 모델 행동 검증 결과 요약
        if: always()
        run: python -m scripts.write_model_summary --diagnostic runtime/model-diagnostic.json
      - uses: actions/upload-artifact@v4
        with:
          name: validated-action
          path: |
            runtime/model-action.json
            runtime/model-diagnostic.json
          retention-days: 1

  dependency-request:
    name: 의존성 승인 요청 생성
    needs: model
    if: needs.model.result == 'success'
    permissions:
      contents: read
      issues: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install -r requirements.txt
      - uses: actions/download-artifact@v4
        with:
          name: validated-action
          path: runtime
      - env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python -m scripts.create_dependency_issue --action runtime/model-action.json

  issue-command:
    name: Issue 승인 명령 검증
    if: github.event_name == 'issue_comment'
    permissions:
      contents: read
      issues: write
    runs-on: ubuntu-latest
    outputs:
      valid: ${{ steps.command.outputs.valid }}
      kind: ${{ steps.command.outputs.kind }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install -r requirements.txt
      - id: command
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_EVENT_PATH: ${{ github.event_path }}
        run: python -m scripts.process_issue_command
      - uses: actions/upload-artifact@v4
        with:
          name: approval-command
          path: runtime/approval-command.json
          retention-days: 1

  apply-issue-command:
    name: 승인 명령 반영
    needs: issue-command
    if: needs.issue-command.outputs.valid == 'true' && needs.issue-command.outputs.kind == 'lifecycle'
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install -r requirements.txt
      - uses: actions/download-artifact@v4
        with:
          name: approval-command
          path: runtime
      - env:
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: python -m scripts.apply_approval_command --input runtime/approval-command.json

  dependency-branch:
    name: 승인된 의존성 브랜치 생성
    needs: issue-command
    if: needs.issue-command.outputs.valid == 'true' && needs.issue-command.outputs.kind == 'dependency'
    permissions:
      contents: write
    runs-on: ubuntu-latest
    outputs:
      branch: ${{ steps.apply.outputs.branch }}
      sha: ${{ steps.apply.outputs.sha }}
      proposal_id: ${{ steps.apply.outputs.proposal_id }}
      package: ${{ steps.apply.outputs.package }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json
      - run: python -m pip install -r requirements.txt
      - run: npm ci
        if: hashFiles('package-lock.json') != ''
      - uses: actions/download-artifact@v4
        with:
          name: approval-command
          path: runtime
      - id: apply
        env:
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: python -m scripts.apply_dependency_branch --input runtime/approval-command.json --run-id "$GITHUB_RUN_ID"

  create-dependency-pr:
    name: 의존성 변경 PR 생성
    needs: dependency-branch
    if: needs.dependency-branch.result == 'success'
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-latest
    outputs:
      pr_number: ${{ steps.pr.outputs.pr_number }}
      default_branch: ${{ steps.pr.outputs.default_branch }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install -r requirements.txt
      - id: pr
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python -m scripts.create_dependency_pr --branch '${{ needs.dependency-branch.outputs.branch }}' --sha '${{ needs.dependency-branch.outputs.sha }}' --proposal '${{ needs.dependency-branch.outputs.proposal_id }}' --package '${{ needs.dependency-branch.outputs.package }}'

  setup-labels:
    name: 저장소 라벨 초기화
    if: github.event_name == 'workflow_dispatch' && inputs.mode == 'setup-labels'
    permissions:
      contents: read
      issues: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install -r requirements.txt
      - env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python -m scripts.setup_labels

  migrate-language:
    name: 기존 에이전트 산출물 언어 마이그레이션
    if: github.event_name == 'workflow_dispatch' && (inputs.mode == 'migrate-language-dry-run' || inputs.mode == 'migrate-language-apply')
    permissions:
      contents: read
      issues: write
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install -r requirements.txt
      - if: inputs.mode == 'migrate-language-dry-run'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python -m scripts.migrate_operating_language
      - if: inputs.mode == 'migrate-language-apply'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python -m scripts.migrate_operating_language --apply

  create-branch:
    name: 에이전트 변경 브랜치 생성
    needs: [preflight, model]
    if: needs.model.result == 'success'
    permissions:
      contents: write
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.commit.outputs.changed }}
      branch: ${{ steps.commit.outputs.branch }}
      sha: ${{ steps.commit.outputs.sha }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json
      - run: python -m pip install -r requirements.txt
      - run: npm ci
        if: hashFiles('package-lock.json') != ''
      - uses: actions/download-artifact@v4
        with:
          name: preflight
          path: runtime
      - uses: actions/download-artifact@v4
        with:
          name: validated-action
          path: runtime
      - name: 로컬 에이전트 브랜치 생성
        id: prepare_branch
        env:
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: python -m scripts.create_agent_branch --action runtime/model-action.json --run-id "$GITHUB_RUN_ID"
      - id: apply
        run: |
          python -m scripts.apply_agent_action \
            --action runtime/model-action.json \
            --preflight runtime/preflight.json \
            --materialized-output runtime/materialized-action.json
      - uses: actions/upload-artifact@v4
        if: steps.apply.outputs.changed == 'true'
        with:
          name: materialized-action
          path: runtime/materialized-action.json
          retention-days: 1
      - if: steps.apply.outputs.changed == 'true'
        run: python -m pytest
      - if: steps.apply.outputs.changed == 'true'
        run: ruff check agents tests scripts
      - if: steps.apply.outputs.changed == 'true'
        run: python -m scripts.check_workflows
      - if: steps.apply.outputs.changed == 'true' && hashFiles('package-lock.json') != ''
        run: npm run lint && npm run typecheck && npm test -- --run && npm run build
      - if: steps.apply.outputs.changed == 'true'
        run: python -m pip_audit --cache-dir .cache/pip-audit -r requirements.txt
      - if: steps.apply.outputs.changed == 'true' && hashFiles('package-lock.json') != ''
        run: npm audit --audit-level=high
      - if: steps.apply.outputs.changed == 'true'
        run: python -m scripts.security_check
      - id: commit
        if: steps.apply.outputs.changed == 'true'
        env:
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: python -m scripts.commit_agent_changes --action runtime/materialized-action.json --run-id "$GITHUB_RUN_ID"

  create-pr:
    name: 에이전트 변경 PR 생성
    needs: create-branch
    if: needs.create-branch.outputs.changed == 'true'
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-latest
    outputs:
      pr_number: ${{ steps.pr.outputs.pr_number }}
      default_branch: ${{ steps.pr.outputs.default_branch }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install -r requirements.txt
      - uses: actions/download-artifact@v4
        with:
          name: materialized-action
          path: runtime
      - id: pr
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python -m scripts.create_agent_pr --action runtime/materialized-action.json --branch '${{ needs.create-branch.outputs.branch }}' --sha '${{ needs.create-branch.outputs.sha }}'

  quality-check:
    name: 변경사항 품질 검사
    needs: [create-branch, create-pr, dependency-branch, create-dependency-pr]
    if: always() && (needs.create-pr.result == 'success' || needs.create-dependency-pr.result == 'success')
    uses: ./.github/workflows/quality-check.yml
    with:
      pull_request_number: ${{ needs.create-pr.outputs.pr_number || needs.create-dependency-pr.outputs.pr_number }}
      agent_branch: ${{ needs.create-branch.outputs.branch || needs.dependency-branch.outputs.branch }}
      commit_sha: ${{ needs.create-branch.outputs.sha || needs.dependency-branch.outputs.sha }}
      called_by_agent: true
    permissions:
      contents: read
      pull-requests: write

  record-quality-status:
    name: PR 품질 상태 기록
    needs: [create-pr, create-dependency-pr, quality-check]
    if: always() && (needs.create-pr.result == 'success' || needs.create-dependency-pr.result == 'success')
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - name: 신뢰된 제어 코드 가져오기
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.repository.default_branch }}
          path: control
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - working-directory: control
        run: python -m pip install -r requirements.txt
      - id: record
        working-directory: control
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ needs.create-pr.outputs.pr_number || needs.create-dependency-pr.outputs.pr_number }}
          VALIDATION_STATUS: ${{ needs.quality-check.outputs.validation_status || 'quality_check_not_started' }}
          VERIFIED_SHA: ${{ needs.quality-check.outputs.verified_sha }}
          FAILED_CHECK: ${{ needs.quality-check.outputs.failed_check }}
          QUALITY_RUN_URL: ${{ needs.quality-check.outputs.quality_run_url }}
          REJECTION_CODE: ${{ needs.quality-check.outputs.rejection_code }}
          REJECTION_REASON: ${{ needs.quality-check.outputs.rejection_reason }}
          REJECTED_FILES: ${{ needs.quality-check.outputs.rejected_files }}
          ALLOWED_FILES: ${{ needs.quality-check.outputs.allowed_files }}
          CHANGED_FILES_COUNT: ${{ needs.quality-check.outputs.changed_files_count }}
          PYTHONPATH: ${{ github.workspace }}/control
          PYTHONNOUSERSITE: "1"
          PYTHONSAFEPATH: "1"
        run: python -m scripts.record_quality_status --pr "$PR_NUMBER"

  quality-gate:
    name: 품질검사 최종 gate
    needs: [create-pr, create-dependency-pr, quality-check, record-quality-status]
    if: always() && (needs.create-pr.result == 'success' || needs.create-dependency-pr.result == 'success')
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: 신뢰된 제어 코드 가져오기
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.repository.default_branch }}
          path: control
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - working-directory: control
        env:
          VALIDATION_STATUS: ${{ needs.quality-check.outputs.validation_status || 'quality_check_not_started' }}
          RECORD_RESULT: ${{ needs.record-quality-status.result }}
          PYTHONPATH: ${{ github.workspace }}/control
          PYTHONNOUSERSITE: "1"
          PYTHONSAFEPATH: "1"
        run: python -m scripts.quality_gate
