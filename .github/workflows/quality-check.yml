name: Quality Check

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number
        required: true
        type: string
      agent_branch:
        description: Validated agent branch
        required: true
        type: string
      commit_sha:
        description: Exact commit to verify
        required: true
        type: string

permissions:
  contents: read

jobs:
  verify-head:
    permissions:
      contents: read
      pull-requests: read
    runs-on: ubuntu-latest
    outputs:
      verified_sha: ${{ steps.verify.outputs.sha }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install -r requirements.txt
      - id: verify
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ inputs.pr_number }}
          AGENT_BRANCH: ${{ inputs.agent_branch }}
          COMMIT_SHA: ${{ inputs.commit_sha }}
        run: python -m scripts.verify_pr_head --pr "$PR_NUMBER" --branch "$AGENT_BRANCH" --sha "$COMMIT_SHA"

  quality:
    needs: verify-head
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.verify-head.outputs.verified_sha }}
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
      - run: python -m pip install -r requirements.txt
      - run: npm ci
        if: hashFiles('package-lock.json') != ''
      - run: python -m pytest
      - run: ruff check agents tests scripts
      - run: python -m scripts.check_workflows
      - run: npm run lint
        if: hashFiles('package-lock.json') != ''
      - run: npm run typecheck
        if: hashFiles('package-lock.json') != ''
      - run: npm test -- --run
        if: hashFiles('package-lock.json') != ''
      - run: npm run build
        if: hashFiles('package-lock.json') != ''
      - run: python -m pip_audit --cache-dir .cache/pip-audit -r requirements.txt
      - run: npm audit --audit-level=high
        if: hashFiles('package-lock.json') != ''
      - run: python -m scripts.security_check

  record-success:
    needs: [verify-head, quality]
    if: success()
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install -r requirements.txt
      - env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ inputs.pr_number }}
        run: python -m scripts.update_pr_status --pr "$PR_NUMBER" --status ready_for_human_review

  record-failure:
    needs: [verify-head, quality]
    if: failure()
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install -r requirements.txt
      - env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ inputs.pr_number }}
        run: python -m scripts.update_pr_status --pr "$PR_NUMBER" --status ci_failed
