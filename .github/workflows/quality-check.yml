name: ZeroFounder 품질 검사

on:
  workflow_call:
    inputs:
      pull_request_number:
        required: true
        type: string
      agent_branch:
        required: true
        type: string
      commit_sha:
        required: true
        type: string
      called_by_agent:
        required: false
        type: boolean
        default: false
    outputs:
      validation_status:
        description: passed, failed 또는 세부 정책 거부 상태
        value: ${{ jobs.finalize.outputs.validation_status }}
      verified_sha:
        description: 실제 검증한 SHA
        value: ${{ jobs.finalize.outputs.verified_sha }}
      failed_check:
        description: 실패한 검사 이름
        value: ${{ jobs.finalize.outputs.failed_check }}
      quality_run_url:
        description: 품질검사 실행 URL
        value: ${{ jobs.finalize.outputs.quality_run_url }}
      rejection_code:
        description: 규칙 기반 거부 코드
        value: ${{ jobs.finalize.outputs.rejection_code }}
      rejection_reason:
        description: 민감정보를 제외한 거부 사유
        value: ${{ jobs.finalize.outputs.rejection_reason }}
      rejected_files:
        description: 거부된 파일 경로 JSON 배열
        value: ${{ jobs.finalize.outputs.rejected_files }}
      allowed_files:
        description: 허용된 파일 경로 JSON 배열
        value: ${{ jobs.finalize.outputs.allowed_files }}
      changed_files_count:
        description: PR 변경 파일 수
        value: ${{ jobs.finalize.outputs.changed_files_count }}
      report_type:
        description: 보고서 유형
        value: ${{ jobs.finalize.outputs.report_type }}
      report_period:
        description: 보고서 기간
        value: ${{ jobs.finalize.outputs.report_period }}
      artifact_path:
        description: 보고서 산출물 경로
        value: ${{ jobs.finalize.outputs.artifact_path }}
      operation_key:
        description: 안정적 작업 키
        value: ${{ jobs.finalize.outputs.operation_key }}
  workflow_dispatch:
    inputs:
      pull_request_number:
        description: 검증할 Pull Request 번호
        required: true
        type: string
      agent_branch:
        description: 검증할 에이전트 브랜치
        required: true
        type: string
      commit_sha:
        description: 검증할 정확한 commit SHA
        required: true
        type: string

permissions:
  contents: read

jobs:
  verify-head:
    name: PR 저장소·상태·브랜치·SHA 검증
    permissions:
      contents: read
      pull-requests: read
    runs-on: ubuntu-latest
    outputs:
      validation_status: ${{ steps.verify.outputs.validation_status }}
      verified_sha: ${{ steps.verify.outputs.sha }}
      rejection_code: ${{ steps.verify.outputs.rejection_code }}
      rejection_reason: ${{ steps.verify.outputs.rejection_reason }}
      rejected_files: ${{ steps.verify.outputs.rejected_files }}
      allowed_files: ${{ '[]' }}
      changed_files_count: ${{ steps.verify.outputs.changed_files_count }}
      report_type: ""
      report_period: ""
      artifact_path: ""
      operation_key: ""
    steps:
      - name: 신뢰된 제어 코드 가져오기
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.repository.default_branch }}
          path: control
          persist-credentials: false
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: control/requirements.txt
      - name: 제어 코드 의존성 설치
        working-directory: control
        run: python -m pip install -r requirements.txt
      - id: verify
        name: 신뢰된 코드로 PR 검증
        working-directory: control
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ inputs.pull_request_number }}
          AGENT_BRANCH: ${{ inputs.agent_branch }}
          COMMIT_SHA: ${{ inputs.commit_sha }}
          PYTHONPATH: ${{ github.workspace }}/control
          PYTHONNOUSERSITE: "1"
          PYTHONSAFEPATH: "1"
        run: python -m scripts.verify_pr_head --pr "$PR_NUMBER" --branch "$AGENT_BRANCH" --sha "$COMMIT_SHA"

  quality:
    name: 정확한 candidate commit 제품 검사
    needs: [verify-head, policy]
    if: needs.verify-head.outputs.validation_status == 'valid' && needs.policy.outputs.validation_status == 'valid'
    permissions:
      contents: read
    runs-on: ubuntu-latest
    outputs:
      python_dependencies_result: ${{ steps.python_dependencies.outcome }}
      pytest_result: ${{ steps.pytest.outcome }}
      ruff_result: ${{ steps.ruff.outcome }}
      npm_ci_result: ${{ steps.npm_ci.outcome }}
      eslint_result: ${{ steps.eslint.outcome }}
      typecheck_result: ${{ steps.typecheck.outcome }}
      vitest_result: ${{ steps.vitest.outcome }}
      build_result: ${{ steps.build.outcome }}
      pip_audit_result: ${{ steps.pip_audit.outcome }}
      npm_audit_result: ${{ steps.npm_audit.outcome }}
    steps:
      - name: 신뢰된 제어 코드 가져오기
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.repository.default_branch }}
          path: control
          persist-credentials: false
      - name: 검증된 candidate commit 가져오기
        uses: actions/checkout@v7
        with:
          ref: ${{ needs.verify-head.outputs.verified_sha }}
          path: candidate
          persist-credentials: false
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: candidate/requirements.txt
      - uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: candidate/package-lock.json
      - id: python_dependencies
        name: candidate Python 의존성 설치
        continue-on-error: true
        working-directory: candidate
        run: >-
          env -u GITHUB_ENV -u GITHUB_PATH -u GITHUB_OUTPUT -u GITHUB_STEP_SUMMARY
          python -m pip install --disable-pip-version-check -r requirements.txt
      - id: pytest
        name: candidate Python 테스트
        continue-on-error: true
        working-directory: candidate
        run: env -u GITHUB_ENV -u GITHUB_PATH -u GITHUB_OUTPUT -u GITHUB_STEP_SUMMARY python -m pytest
      - id: ruff
        name: candidate Ruff 검사
        continue-on-error: true
        working-directory: candidate
        run: env -u GITHUB_ENV -u GITHUB_PATH -u GITHUB_OUTPUT -u GITHUB_STEP_SUMMARY python -m ruff check agents tests scripts
      - id: npm_ci
        name: candidate Node 의존성 설치
        continue-on-error: true
        working-directory: candidate
        run: env -u GITHUB_ENV -u GITHUB_PATH -u GITHUB_OUTPUT -u GITHUB_STEP_SUMMARY npm ci --ignore-scripts
      - id: eslint
        name: candidate ESLint 검사
        continue-on-error: true
        working-directory: candidate
        run: env -u GITHUB_ENV -u GITHUB_PATH -u GITHUB_OUTPUT -u GITHUB_STEP_SUMMARY npm run lint
      - id: typecheck
        name: candidate TypeScript 검사
        continue-on-error: true
        working-directory: candidate
        run: env -u GITHUB_ENV -u GITHUB_PATH -u GITHUB_OUTPUT -u GITHUB_STEP_SUMMARY npm run typecheck
      - id: vitest
        name: candidate Vitest 검사
        continue-on-error: true
        working-directory: candidate
        run: env -u GITHUB_ENV -u GITHUB_PATH -u GITHUB_OUTPUT -u GITHUB_STEP_SUMMARY npm test -- --run
      - id: build
        name: candidate production build
        continue-on-error: true
        working-directory: candidate
        run: env -u GITHUB_ENV -u GITHUB_PATH -u GITHUB_OUTPUT -u GITHUB_STEP_SUMMARY npm run build
      - id: pip_audit
        name: candidate Python 의존성 감사
        continue-on-error: true
        working-directory: candidate
        run: env -u GITHUB_ENV -u GITHUB_PATH -u GITHUB_OUTPUT -u GITHUB_STEP_SUMMARY python -m pip_audit --cache-dir .cache/pip-audit -r requirements.txt
      - id: npm_audit
        name: candidate Node 의존성 감사
        continue-on-error: true
        working-directory: candidate
        run: env -u GITHUB_ENV -u GITHUB_PATH -u GITHUB_OUTPUT -u GITHUB_STEP_SUMMARY npm audit --audit-level=high

  policy:
    name: 신뢰된 코드로 candidate 정책 검사
    needs: verify-head
    if: needs.verify-head.outputs.validation_status == 'valid'
    permissions:
      contents: read
    runs-on: ubuntu-latest
    outputs:
      validation_status: ${{ steps.candidate_validation.outputs.validation_status }}
      verified_sha: ${{ steps.candidate_validation.outputs.verified_sha }}
      rejection_code: ${{ steps.candidate_validation.outputs.rejection_code }}
      rejection_reason: ${{ steps.candidate_validation.outputs.rejection_reason }}
      rejected_files: ${{ steps.candidate_validation.outputs.rejected_files }}
      allowed_files: ${{ steps.candidate_validation.outputs.allowed_files }}
      changed_files_count: ${{ steps.candidate_validation.outputs.changed_files_count }}
      report_type: ${{ steps.candidate_validation.outputs.report_type }}
      report_period: ${{ steps.candidate_validation.outputs.report_period }}
      artifact_path: ${{ steps.candidate_validation.outputs.artifact_path }}
      operation_key: ${{ steps.candidate_validation.outputs.operation_key }}
      workflow_result: ${{ steps.workflow.outcome }}
      security_result: ${{ steps.security.outcome }}
    steps:
      - name: 신뢰된 제어 코드 가져오기
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.repository.default_branch }}
          path: control
          persist-credentials: false
      - name: 검증된 candidate commit 가져오기
        uses: actions/checkout@v7
        with:
          ref: ${{ needs.verify-head.outputs.verified_sha }}
          path: candidate
          persist-credentials: false
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: control/requirements.txt
      - name: 제어 코드 의존성 설치
        working-directory: control
        run: python -m pip install -r requirements.txt
      - id: candidate_validation
        name: action별 candidate 변경 검증
        working-directory: control
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ inputs.pull_request_number }}
          AGENT_BRANCH: ${{ inputs.agent_branch }}
          COMMIT_SHA: ${{ inputs.commit_sha }}
          PYTHONPATH: ${{ github.workspace }}/control
          PYTHONNOUSERSITE: "1"
          PYTHONSAFEPATH: "1"
        run: >-
          python -m scripts.validate_candidate_change
          --pr "$PR_NUMBER"
          --branch "$AGENT_BRANCH"
          --sha "$COMMIT_SHA"
          --control-root "$GITHUB_WORKSPACE/control"
          --candidate-root "$GITHUB_WORKSPACE/candidate"
          --output "$GITHUB_WORKSPACE/runtime/candidate-validation.json"
      - id: workflow
        name: candidate YAML 및 workflow 권한 검사
        if: steps.candidate_validation.outputs.validation_status == 'valid'
        continue-on-error: true
        working-directory: control
        env:
          PYTHONPATH: ${{ github.workspace }}/control
          PYTHONNOUSERSITE: "1"
          PYTHONSAFEPATH: "1"
        run: python -m scripts.check_candidate_workflows --root "$GITHUB_WORKSPACE/candidate"
      - id: security
        name: candidate 비밀값 및 금지 경로 검사
        if: steps.candidate_validation.outputs.validation_status == 'valid'
        continue-on-error: true
        working-directory: control
        env:
          PYTHONPATH: ${{ github.workspace }}/control
          PYTHONNOUSERSITE: "1"
          PYTHONSAFEPATH: "1"
        run: python -m scripts.security_check --root "$GITHUB_WORKSPACE/candidate"

  finalize:
    name: 신뢰된 코드로 품질검사 결과 확정
    needs: [verify-head, quality, policy]
    if: always()
    permissions:
      contents: read
    runs-on: ubuntu-latest
    outputs:
      validation_status: ${{ steps.result.outputs.validation_status }}
      verified_sha: ${{ steps.result.outputs.verified_sha }}
      failed_check: ${{ steps.result.outputs.failed_check }}
      quality_run_url: ${{ steps.result.outputs.quality_run_url }}
      rejection_code: ${{ steps.result.outputs.rejection_code }}
      rejection_reason: ${{ steps.result.outputs.rejection_reason }}
      rejected_files: ${{ steps.result.outputs.rejected_files }}
      allowed_files: ${{ steps.result.outputs.allowed_files }}
      changed_files_count: ${{ steps.result.outputs.changed_files_count }}
      report_type: ${{ steps.result.outputs.report_type }}
      report_period: ${{ steps.result.outputs.report_period }}
      artifact_path: ${{ steps.result.outputs.artifact_path }}
      operation_key: ${{ steps.result.outputs.operation_key }}
    steps:
      - name: 신뢰된 제어 코드 가져오기
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.repository.default_branch }}
          path: control
          persist-credentials: false
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: control/requirements.txt
      - name: 제어 코드 의존성 설치
        working-directory: control
        run: python -m pip install -r requirements.txt
      - id: result
        name: candidate 검사 결과 집계
        working-directory: control
        env:
          PYTHONPATH: ${{ github.workspace }}/control
          PYTHONNOUSERSITE: "1"
          PYTHONSAFEPATH: "1"
          PYTHON_DEPENDENCIES_RESULT: ${{ needs.quality.outputs.python_dependencies_result }}
          PYTEST_RESULT: ${{ needs.quality.outputs.pytest_result }}
          RUFF_RESULT: ${{ needs.quality.outputs.ruff_result }}
          WORKFLOW_RESULT: ${{ needs.policy.outputs.workflow_result }}
          NPM_CI_RESULT: ${{ needs.quality.outputs.npm_ci_result }}
          ESLINT_RESULT: ${{ needs.quality.outputs.eslint_result }}
          TYPECHECK_RESULT: ${{ needs.quality.outputs.typecheck_result }}
          VITEST_RESULT: ${{ needs.quality.outputs.vitest_result }}
          BUILD_RESULT: ${{ needs.quality.outputs.build_result }}
          PIP_AUDIT_RESULT: ${{ needs.quality.outputs.pip_audit_result }}
          NPM_AUDIT_RESULT: ${{ needs.quality.outputs.npm_audit_result }}
          SECURITY_RESULT: ${{ needs.policy.outputs.security_result }}
          VERIFICATION_STATUS: ${{ needs.policy.outputs.validation_status || needs.verify-head.outputs.validation_status }}
          VERIFIED_SHA: ${{ needs.policy.outputs.verified_sha || needs.verify-head.outputs.verified_sha }}
          QUALITY_JOB_RESULT: ${{ needs.quality.result }}
          POLICY_JOB_RESULT: ${{ needs.policy.result }}
          QUALITY_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          REJECTION_CODE: ${{ needs.policy.outputs.rejection_code || needs.verify-head.outputs.rejection_code }}
          REJECTION_REASON: ${{ needs.policy.outputs.rejection_reason || needs.verify-head.outputs.rejection_reason }}
          REJECTED_FILES: ${{ needs.policy.outputs.rejected_files || needs.verify-head.outputs.rejected_files || '[]' }}
          ALLOWED_FILES: ${{ needs.policy.outputs.allowed_files || needs.verify-head.outputs.allowed_files || '[]' }}
          CHANGED_FILES_COUNT: ${{ needs.policy.outputs.changed_files_count || needs.verify-head.outputs.changed_files_count || '0' }}
          REPORT_TYPE: ${{ needs.policy.outputs.report_type || needs.verify-head.outputs.report_type }}
          REPORT_PERIOD: ${{ needs.policy.outputs.report_period || needs.verify-head.outputs.report_period }}
          ARTIFACT_PATH: ${{ needs.policy.outputs.artifact_path || needs.verify-head.outputs.artifact_path }}
          OPERATION_KEY: ${{ needs.policy.outputs.operation_key || needs.verify-head.outputs.operation_key }}
        run: >-
          python -m scripts.summarize_quality_checks
          --results-dir "$GITHUB_WORKSPACE/runtime/quality-results"
          --output "$GITHUB_WORKSPACE/runtime/quality-summary.json"
          --verification-status "$VERIFICATION_STATUS"
          --verified-sha "$VERIFIED_SHA"
          --quality-job-result "$QUALITY_JOB_RESULT"
          --policy-job-result "$POLICY_JOB_RESULT"
          --run-url "$QUALITY_RUN_URL"
          --rejection-code "$REJECTION_CODE"
          --rejection-reason "$REJECTION_REASON"
          --rejected-files "$REJECTED_FILES"
          --allowed-files "$ALLOWED_FILES"
          --changed-files-count "$CHANGED_FILES_COUNT"
          --report-type "$REPORT_TYPE"
          --report-period "$REPORT_PERIOD"
          --artifact-path "$ARTIFACT_PATH"
          --operation-key "$OPERATION_KEY"

  manual-result:
    name: 수동 품질검사 결과 저장
    needs: finalize
    if: always() && inputs.called_by_agent != true
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: 신뢰된 제어 코드 가져오기
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.repository.default_branch }}
          path: control
          persist-credentials: false
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
      - name: 제어 코드 의존성 설치
        working-directory: control
        run: python -m pip install -r requirements.txt
      - name: 수동 실행 결과 JSON 작성
        working-directory: control
        env:
          PYTHONPATH: ${{ github.workspace }}/control
          VALIDATION_STATUS: ${{ needs.finalize.outputs.validation_status }}
          VERIFIED_SHA: ${{ needs.finalize.outputs.verified_sha }}
          FAILED_CHECK: ${{ needs.finalize.outputs.failed_check }}
          QUALITY_RUN_URL: ${{ needs.finalize.outputs.quality_run_url }}
          REJECTION_CODE: ${{ needs.finalize.outputs.rejection_code }}
          REJECTION_REASON: ${{ needs.finalize.outputs.rejection_reason }}
          REJECTED_FILES: ${{ needs.finalize.outputs.rejected_files }}
          ALLOWED_FILES: ${{ needs.finalize.outputs.allowed_files }}
          CHANGED_FILES_COUNT: ${{ needs.finalize.outputs.changed_files_count }}
          REPORT_TYPE: ${{ needs.finalize.outputs.report_type }}
          REPORT_PERIOD: ${{ needs.finalize.outputs.report_period }}
          ARTIFACT_PATH: ${{ needs.finalize.outputs.artifact_path }}
          OPERATION_KEY: ${{ needs.finalize.outputs.operation_key }}
          QUALITY_RESULT_PATH: ${{ github.workspace }}/runtime/quality-result.json
        run: python -m scripts.write_quality_result
      - name: 수동 실행 결과 요약
        working-directory: control
        env:
          PYTHONPATH: ${{ github.workspace }}/control
          QUALITY_RESULT_PATH: ${{ github.workspace }}/runtime/quality-result.json
        run: python -m scripts.write_quality_summary
      - uses: actions/upload-artifact@v7
        with:
          name: quality-check-manual-result
          path: runtime/quality-result.json
          retention-days: 7

  manual-record:
    name: 수동 품질검사 PR 상태 기록
    needs: finalize
    if: always() && inputs.called_by_agent != true
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - name: 신뢰된 제어 코드 가져오기
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.repository.default_branch }}
          path: control
          persist-credentials: false
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
      - name: 제어 코드 의존성 설치
        working-directory: control
        run: python -m pip install -r requirements.txt
      - name: PR에 품질검사 상태 기록
        working-directory: control
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ inputs.pull_request_number }}
          VALIDATION_STATUS: ${{ needs.finalize.outputs.validation_status }}
          VERIFIED_SHA: ${{ needs.finalize.outputs.verified_sha }}
          FAILED_CHECK: ${{ needs.finalize.outputs.failed_check }}
          QUALITY_RUN_URL: ${{ needs.finalize.outputs.quality_run_url }}
          REJECTION_CODE: ${{ needs.finalize.outputs.rejection_code }}
          REJECTION_REASON: ${{ needs.finalize.outputs.rejection_reason }}
          REJECTED_FILES: ${{ needs.finalize.outputs.rejected_files }}
          ALLOWED_FILES: ${{ needs.finalize.outputs.allowed_files }}
          CHANGED_FILES_COUNT: ${{ needs.finalize.outputs.changed_files_count }}
          REPORT_TYPE: ${{ needs.finalize.outputs.report_type }}
          REPORT_PERIOD: ${{ needs.finalize.outputs.report_period }}
          ARTIFACT_PATH: ${{ needs.finalize.outputs.artifact_path }}
          OPERATION_KEY: ${{ needs.finalize.outputs.operation_key }}
          PYTHONPATH: ${{ github.workspace }}/control
          PYTHONNOUSERSITE: "1"
          PYTHONSAFEPATH: "1"
        run: python -m scripts.record_quality_status --pr "$PR_NUMBER"
