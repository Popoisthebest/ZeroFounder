name: Collect Market Signals

on:
  schedule:
    - cron: "43 */6 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: zerofounder-signal-collector
  cancel-in-progress: false

jobs:
  collect:
    permissions:
      actions: read
      contents: write
      issues: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install -r requirements.txt
      - env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python -m agents.signal_collector --root .
          python -m agents.metrics
          python -m agents.reporting --root .
      - run: |
          if git diff --quiet -- signals company/metrics.json company/usage.json reports; then exit 0; fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add signals/raw company/metrics.json company/usage.json reports
          git commit -m "chore(agent): collect-signals [run:${GITHUB_RUN_ID}]"
          git push origin HEAD
